version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wb_parser_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wb_parser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wb_parser_password}
      POSTGRES_DB: ${POSTGRES_DB:-wb_parser_bot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wb_parser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wb_parser_network

  redis:
    image: redis:7-alpine
    container_name: wb_parser_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wb_parser_network

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: wb_parser_bot
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wb_parser_network
    restart: unless-stopped

  parser:
    build:
      context: .
      dockerfile: docker/parser.Dockerfile
    container_name: wb_parser_parser
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wb_parser_network
    restart: unless-stopped

  event_detector:
    build:
      context: .
      dockerfile: docker/event_detector.Dockerfile
    container_name: wb_parser_event_detector
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wb_parser_network
    restart: unless-stopped

  notifier:
    build:
      context: .
      dockerfile: docker/notifier.Dockerfile
    container_name: wb_parser_notifier
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wb_parser_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  wb_parser_network:
    driver: bridge
